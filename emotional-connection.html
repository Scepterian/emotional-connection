<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Emotional Connection</title>
<style>
  :root {
    --rose: #c2185b;
    --rose-light: #fce4ec;
    --rose-mid: #f48fb1;
    --rose-dark: #880e4f;
    --ink: #1a1a2e;
    --ink-mid: #4a4a6a;
    --ink-soft: #8888aa;
    --surface: #ffffff;
    --surface-2: #fdf6f9;
    --surface-3: #f5eef4;
    --border: #e8dded;
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 12px rgba(194,24,91,0.08);
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: var(--surface-2);
    color: var(--ink);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: env(safe-area-inset-top, 12px) 16px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar-logo {
    width: 32px; height: 32px;
    background: var(--rose);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .topbar-logo svg { width: 18px; height: 18px; fill: white; }
  .topbar-title { font-size: 17px; font-weight: 600; color: var(--ink); flex: 1; letter-spacing: -0.3px; }
  .topbar-sub { font-size: 11px; color: var(--ink-soft); }

  /* ── BUTTONS ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--ink);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    padding: 8px 14px;
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
  }
  .btn:active { background: var(--surface-3); }
  .btn-rose {
    background: var(--rose);
    border-color: var(--rose-dark);
    color: white;
  }
  .btn-rose:active { background: var(--rose-dark); }
  .btn-ghost { border-color: transparent; background: transparent; color: var(--ink-mid); }
  .btn-danger { color: #c62828; border-color: #ffcdd2; background: #fff8f8; }
  .btn-sm { font-size: 12px; padding: 5px 10px; }
  .btn-full { width: 100%; }

  /* ── SCREENS ── */
  .screen { display: none; }
  .screen.active { display: block; }

  /* ── HOME ── */
  #home-actions {
    padding: 14px 16px 10px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .entry-count {
    font-size: 12px;
    color: var(--ink-soft);
    flex: 1;
  }

  .empty-state {
    padding: 64px 32px;
    text-align: center;
    color: var(--ink-soft);
  }
  .empty-state svg {
    width: 56px; height: 56px;
    fill: var(--rose-mid);
    opacity: 0.5;
    margin-bottom: 16px;
  }
  .empty-state h2 { font-size: 17px; font-weight: 600; color: var(--ink-mid); margin-bottom: 6px; }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ── ENTRY CARDS ── */
  .entries { padding: 0 16px 100px; }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
  }
  .entry-card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 8px;
  }
  .emotion-badge {
    display: inline-block;
    background: var(--rose-light);
    color: var(--rose-dark);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 0.1px;
  }
  .entry-names {
    font-size: 12px;
    color: var(--ink-soft);
    margin-top: 3px;
  }
  .entry-date {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .entry-note {
    font-size: 14px;
    color: var(--ink-mid);
    line-height: 1.6;
    padding-top: 8px;
    border-top: 1px solid var(--surface-3);
    white-space: pre-wrap;
  }
  .entry-delete {
    margin-left: auto;
    flex-shrink: 0;
    background: transparent;
    border: none;
    cursor: pointer;
    padding: 4px;
    color: var(--ink-soft);
    font-size: 18px;
    line-height: 1;
  }
  .entry-delete:active { color: #c62828; }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    right: calc(50% - 240px + 20px);
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--rose);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px rgba(194,24,91,0.35);
    z-index: 40;
    transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.93); }
  .fab svg { width: 26px; height: 26px; fill: white; }
  @media (max-width: 480px) {
    .fab { right: 20px; }
  }

  /* ── MODAL / SHEET ── */
  .sheet-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.4);
    z-index: 100;
    align-items: flex-end;
    justify-content: center;
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 480px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 0 0 env(safe-area-inset-bottom, 20px);
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp {
    from { transform: translateY(60px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .sheet-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 0;
  }
  .sheet-header {
    display: flex;
    align-items: center;
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .sheet-title { font-size: 16px; font-weight: 600; flex: 1; letter-spacing: -0.2px; }
  .sheet-body { padding: 16px; }

  /* ── FORM ── */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { margin-bottom: 14px; }
  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 5px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 15px;
    font-family: var(--font);
    background: var(--surface);
    color: var(--ink);
    appearance: none;
    -webkit-appearance: none;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--rose);
  }
  .form-group textarea { resize: vertical; min-height: 100px; line-height: 1.6; }
  .select-wrap { position: relative; }
  .select-wrap::after {
    content: '';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    border: 5px solid transparent;
    border-top-color: var(--ink-soft);
    pointer-events: none;
  }
  .form-actions { display: flex; gap: 10px; padding-top: 4px; }

  /* ── REPORT SCREEN ── */
  #screen-report .topbar { justify-content: space-between; }
  .report-meta {
    padding: 14px 16px 6px;
    font-size: 12px;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .report-section { padding: 0 16px 100px; }
  .report-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    page-break-inside: avoid;
  }
  .report-emotion { font-size: 14px; font-weight: 700; color: var(--rose-dark); margin-bottom: 3px; }
  .report-who { font-size: 12px; color: var(--ink-soft); margin-bottom: 2px; }
  .report-date { font-size: 11px; color: var(--ink-soft); margin-bottom: 8px; }
  .report-note { font-size: 13px; color: var(--ink-mid); line-height: 1.65; white-space: pre-wrap; }

  .report-fab {
    position: fixed;
    bottom: calc(24px + env(safe-area-inset-bottom, 0px));
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 32px);
    max-width: 448px;
    z-index: 40;
  }

  /* ── PRINT ── */
  @media print {
    .topbar, .fab, .report-fab, .btn, .sheet-overlay { display: none !important; }
    body { background: white; max-width: 100%; }
    .report-section { padding: 0; }
    .report-card { box-shadow: none; border: 1px solid #ddd; margin-bottom: 14px; }
    .report-meta { padding: 0 0 10px; border-bottom: 2px solid #c2185b; margin-bottom: 16px; }
    h1 { font-size: 22px; color: #880e4f; margin-bottom: 4px; }
  }

  /* ── CONFIRM DIALOG ── */
  .confirm-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,46,0.45);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .confirm-overlay.open { display: flex; }
  .confirm-box {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 20px;
    width: 100%;
    max-width: 320px;
    text-align: center;
  }
  .confirm-box h3 { font-size: 16px; margin-bottom: 8px; }
  .confirm-box p { font-size: 14px; color: var(--ink-soft); margin-bottom: 18px; line-height: 1.5; }
  .confirm-actions { display: flex; gap: 10px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════ HOME ═══ -->
<div id="screen-home" class="screen active">

  <div class="topbar">
    <div class="topbar-logo">
      <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    </div>
    <div>
      <div class="topbar-title">Emotional Connection</div>
    </div>
    <button class="btn btn-sm" onclick="showReport()">View report</button>
  </div>

  <div id="home-actions">
    <span class="entry-count" id="entry-count">No entries yet</span>
  </div>

  <div id="empty-state" class="empty-state">
    <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    <h2>Your journal is empty</h2>
    <p>Tap the + button below to capture your first feeling.</p>
  </div>

  <div id="entries-list" class="entries"></div>

  <button class="fab" onclick="openNewEntry()" aria-label="Add new entry">
    <svg viewBox="0 0 24 24"><path d="M19 11h-6V5h-2v6H5v2h6v6h2v-6h6z"/></svg>
  </button>
</div>

<!-- ═══════════════════════════════════════ REPORT ═══ -->
<div id="screen-report" class="screen">

  <div class="topbar">
    <button class="btn btn-ghost btn-sm" onclick="showHome()">← Back</button>
    <div class="topbar-title">Journal report</div>
    <button class="btn btn-sm btn-rose" onclick="window.print()">Print / PDF</button>
  </div>

  <div class="report-meta" id="report-meta"></div>
  <div class="report-section" id="report-entries"></div>

  <div class="report-fab">
    <button class="btn btn-rose btn-full" onclick="window.print()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white" style="flex-shrink:0"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>
      Save as PDF
    </button>
  </div>
</div>

<!-- ═══════════════════════════════════════ NEW ENTRY SHEET ═══ -->
<div class="sheet-overlay" id="entry-sheet">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title" id="sheet-title">New entry</span>
      <button class="btn btn-ghost btn-sm" onclick="closeSheet()">Cancel</button>
    </div>
    <div class="sheet-body">

      <div class="form-row">
        <div class="form-group">
          <label>Your name</label>
          <input type="text" id="inp-from" placeholder="Optional" autocomplete="name">
        </div>
        <div class="form-group">
          <label>About</label>
          <input type="text" id="inp-about" placeholder="Their name" autocomplete="off">
        </div>
      </div>

      <div class="form-group">
        <label>Date &amp; time</label>
        <input type="datetime-local" id="inp-datetime">
      </div>

      <div class="form-group">
        <label>Emotion / feeling</label>
        <div class="select-wrap">
          <select id="inp-emotion">
            <option value="">— Choose an emotion —</option>
            <optgroup label="Love &amp; Connection">
              <option>Love</option>
              <option>Adoration</option>
              <option>Tenderness</option>
              <option>Deep attachment</option>
              <option>Intimacy</option>
              <option>Trust</option>
              <option>Fondness</option>
            </optgroup>
            <optgroup label="Joy &amp; Warmth">
              <option>Joy</option>
              <option>Happiness</option>
              <option>Gratitude</option>
              <option>Excitement</option>
              <option>Pride</option>
              <option>Awe</option>
              <option>Hope</option>
              <option>Playfulness</option>
              <option>Delight</option>
            </optgroup>
            <optgroup label="Longing &amp; Missing">
              <option>Longing</option>
              <option>Missing them</option>
              <option>Nostalgia</option>
              <option>Yearning</option>
              <option>Homesickness for them</option>
            </optgroup>
            <optgroup label="Vulnerability &amp; Fear">
              <option>Vulnerability</option>
              <option>Fear of losing them</option>
              <option>Insecurity</option>
              <option>Jealousy</option>
              <option>Neediness</option>
              <option>Anxiety about us</option>
            </optgroup>
            <optgroup label="Tension &amp; Hurt">
              <option>Frustration</option>
              <option>Disappointment</option>
              <option>Hurt</option>
              <option>Sadness</option>
              <option>Anger</option>
              <option>Resentment</option>
              <option>Guilt</option>
              <option>Shame</option>
              <option>Betrayal</option>
            </optgroup>
            <optgroup label="Peace &amp; Contentment">
              <option>Peace</option>
              <option>Contentment</option>
              <option>Comfort</option>
              <option>Security</option>
              <option>Acceptance</option>
              <option>Calm</option>
            </optgroup>
            <optgroup label="Admiration &amp; Respect">
              <option>Admiration</option>
              <option>Respect</option>
              <option>Inspired by them</option>
              <option>Pride in them</option>
            </optgroup>
            <optgroup label="Other">
              <option>Confusion</option>
              <option>Overwhelmed</option>
              <option>Conflicted</option>
              <option>Grateful</option>
              <option>Other</option>
            </optgroup>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Details</label>
        <textarea id="inp-note" placeholder="What are you feeling? What prompted this? Write as much or as little as you'd like…"></textarea>
      </div>

      <div class="form-actions">
        <button class="btn btn-rose btn-full" onclick="saveEntry()" style="font-size:15px;padding:13px">Save entry</button>
      </div>

    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════ CONFIRM DELETE ═══ -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3>Delete this entry?</h3>
    <p>This feeling and its details will be permanently removed from your journal.</p>
    <div class="confirm-actions">
      <button class="btn btn-full" onclick="closeConfirm()">Keep it</button>
      <button class="btn btn-danger btn-full" id="confirm-yes-btn">Delete</button>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'ec_journal_v1';
  let entries = [];
  let pendingDeleteId = null;

  // ── PERSISTENCE ──────────────────────────────────────
  function loadData() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      entries = raw ? JSON.parse(raw) : [];
    } catch(e) { entries = []; }
  }

  function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); } catch(e) {}
  }

  // ── DATE HELPERS ─────────────────────────────────────
  function nowLocal() {
    const d = new Date();
    return new Date(d.getTime() - d.getTimezoneOffset() * 60000).toISOString().slice(0,16);
  }

  function formatDate(dtStr) {
    if (!dtStr) return '';
    const d = new Date(dtStr);
    return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric', year:'numeric' })
      + ' at '
      + d.toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
  }

  // ── RENDER HOME ──────────────────────────────────────
  function renderHome() {
    const list = document.getElementById('entries-list');
    const empty = document.getElementById('empty-state');
    const countEl = document.getElementById('entry-count');
    const sorted = [...entries].sort((a,b) => new Date(b.datetime) - new Date(a.datetime));

    if (!entries.length) {
      empty.style.display = 'block';
      list.innerHTML = '';
      countEl.textContent = 'No entries yet';
      return;
    }

    empty.style.display = 'none';
    countEl.textContent = entries.length === 1 ? '1 entry' : `${entries.length} entries`;

    list.innerHTML = sorted.map(e => {
      const namesLine = [e.from ? 'From: ' + e.from : '', e.about ? 'About: ' + e.about : ''].filter(Boolean).join('  ·  ');
      return `
        <div class="entry-card">
          <div class="entry-card-top">
            <div style="flex:1">
              <span class="emotion-badge">${esc(e.emotion)}</span>
              ${namesLine ? `<div class="entry-names">${esc(namesLine)}</div>` : ''}
              <div class="entry-date">${formatDate(e.datetime)}</div>
            </div>
            <button class="entry-delete" onclick="confirmDelete('${e.id}')" aria-label="Delete entry">&#xd7;</button>
          </div>
          ${e.note ? `<div class="entry-note">${esc(e.note)}</div>` : ''}
        </div>`;
    }).join('');
  }

  // ── SCREENS ──────────────────────────────────────────
  function showHome() {
    document.getElementById('screen-home').classList.add('active');
    document.getElementById('screen-report').classList.remove('active');
  }

  function showReport() {
    const sorted = [...entries].sort((a,b) => new Date(a.datetime) - new Date(b.datetime));
    const meta = document.getElementById('report-meta');
    const re = document.getElementById('report-entries');

    if (!entries.length) {
      meta.innerHTML = '';
      re.innerHTML = `<div class="empty-state"><h2>Nothing to report yet</h2><p>Add some entries first, then come back here to generate your report.</p></div>`;
    } else {
      const names = [...new Set(entries.map(e => e.from).filter(Boolean))];
      const abouts = [...new Set(entries.map(e => e.about).filter(Boolean))];
      meta.innerHTML = `
        <strong>${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}</strong>
        ${names.length ? ' &nbsp;·&nbsp; Written by: ' + names.map(esc).join(', ') : ''}
        ${abouts.length ? ' &nbsp;·&nbsp; About: ' + abouts.map(esc).join(', ') : ''}
        <br>Generated ${new Date().toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' })}
      `;
      re.innerHTML = sorted.map(e => {
        const namesLine = [e.from ? e.from : '', e.about ? '→ ' + e.about : ''].filter(Boolean).join(' ');
        return `
          <div class="report-card">
            <div class="report-emotion">${esc(e.emotion)}</div>
            ${namesLine ? `<div class="report-who">${esc(namesLine)}</div>` : ''}
            <div class="report-date">${formatDate(e.datetime)}</div>
            ${e.note ? `<div class="report-note">${esc(e.note)}</div>` : ''}
          </div>`;
      }).join('');
    }

    document.getElementById('screen-home').classList.remove('active');
    document.getElementById('screen-report').classList.add('active');
  }

  // ── ENTRY SHEET ───────────────────────────────────────
  function openNewEntry() {
    document.getElementById('sheet-title').textContent = 'New entry';
    document.getElementById('inp-datetime').value = nowLocal();
    document.getElementById('inp-from').value = '';
    document.getElementById('inp-about').value = '';
    document.getElementById('inp-emotion').value = '';
    document.getElementById('inp-note').value = '';
    document.getElementById('entry-sheet').classList.add('open');
  }

  function closeSheet() {
    document.getElementById('entry-sheet').classList.remove('open');
  }

  function saveEntry() {
    const emotion = document.getElementById('inp-emotion').value.trim();
    if (!emotion) {
      alert('Please select an emotion or feeling before saving.');
      return;
    }
    const entry = {
      id: Date.now().toString(),
      datetime: document.getElementById('inp-datetime').value || new Date().toISOString(),
      from: document.getElementById('inp-from').value.trim(),
      about: document.getElementById('inp-about').value.trim(),
      emotion,
      note: document.getElementById('inp-note').value.trim()
    };
    entries.push(entry);
    saveData();
    renderHome();
    closeSheet();
  }

  // ── DELETE ────────────────────────────────────────────
  function confirmDelete(id) {
    pendingDeleteId = id;
    document.getElementById('confirm-overlay').classList.add('open');
  }

  function closeConfirm() {
    pendingDeleteId = null;
    document.getElementById('confirm-overlay').classList.remove('open');
  }

  document.getElementById('confirm-yes-btn').addEventListener('click', function() {
    if (pendingDeleteId) {
      entries = entries.filter(e => e.id !== pendingDeleteId);
      saveData();
      renderHome();
    }
    closeConfirm();
  });

  // ── UTILS ─────────────────────────────────────────────
  function esc(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;')
      .replace(/'/g,'&#39;');
  }

  // Close sheet on overlay tap
  document.getElementById('entry-sheet').addEventListener('click', function(e) {
    if (e.target === this) closeSheet();
  });

  // ── INIT ──────────────────────────────────────────────
  loadData();
  renderHome();
</script>
</body>
</html>
